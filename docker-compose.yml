services:
  app:
    build: .
    restart: unless-stopped
    networks:
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network"
      - "traefik.http.services.app.loadbalancer.server.port=80"

networks:
  dokploy-network:
    external: true
